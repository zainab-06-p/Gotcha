methodology_summary: |
  Corroboration-based ranker targeting: Senior AI Engineer, Redrob AI.
  
  Hard disqualifiers (pre-filter): 8 strict rules eliminate non-engineering roles
  (Mobile, QA, Java, DevOps), IT-services-only backgrounds, wrong seniority, and
  keyword stuffers before any scoring runs.
  
  Fully deterministic scoring: 8-component pipeline — skill-JD fuzzy match
  (rapidfuzz + synonym dict), assessment-backed trust scores, TF-IDF career-description
  relevance, YoE fit scoring, behavioral signals, feasibility, data confidence,
  and capped pedigree. Includes honeypot detection for title/description mismatches.
  
  Archetype clustering (K-Means, 8 clusters) groups the candidate pool by role archetype.
  Redirect detection identifies high-quality candidates who mismatch the JD but fit other roles.
  Runtime ~2-5 minutes for 5K candidates on CPU. Fully offline — no external API calls.

